services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    volumes:
      - huascar-data:/app/data
    healthcheck:
      test: wget -qO- http://localhost:3001/api/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - huascar-network

  agent-creator:
    build:
      context: .
      dockerfile: Dockerfile.agent-creator
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - huascar-network

volumes:
  huascar-data:

networks:
  huascar-network:
    driver: bridge
