app = "huascar-agent-creator"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.agent-creator"

[env]
  VITE_API_URL = "https://huascar-backend.fly.dev"

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
